name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write
  packages: write

concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/loafykitten/loafyweb
  COMPOSE_PROJECT_NAME: loafyweb

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Astro checks
        run: bun run check

      - name: Build site
        run: bun run build

  deploy:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Derive image tags
        id: vars
        run: echo "sha_tag=sha-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:main
            ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Connect workflow runner to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          audience: ${{ secrets.TS_OAUTH_AUDIENCE }}
          tags: tag:ci
          ping: ${{ secrets.SERVER_HOST }}

      - name: Configure SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${SERVER_PORT:-22}" -H "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Sync deployment files
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          ssh -p "${SERVER_PORT:-22}" "${SERVER_USER}@${SERVER_HOST}" "mkdir -p '${DEPLOY_PATH}'"
          scp -P "${SERVER_PORT:-22}" deploy/compose.yaml "${SERVER_USER}@${SERVER_HOST}:${DEPLOY_PATH}/compose.yaml"
          scp -P "${SERVER_PORT:-22}" deploy/.env.example "${SERVER_USER}@${SERVER_HOST}:${DEPLOY_PATH}/.env.example"

      - name: Deploy on server
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          IMAGE_TAG: ${{ steps.vars.outputs.sha_tag }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          COMPOSE_PROJECT_NAME: ${{ env.COMPOSE_PROJECT_NAME }}
        run: |
          ssh -p "${SERVER_PORT:-22}" "${SERVER_USER}@${SERVER_HOST}" \
            "DEPLOY_PATH='${DEPLOY_PATH}' IMAGE_NAME='${IMAGE_NAME}' IMAGE_TAG='${IMAGE_TAG}' GHCR_USERNAME='${GHCR_USERNAME}' GHCR_PAT='${GHCR_PAT}' COMPOSE_PROJECT_NAME='${COMPOSE_PROJECT_NAME}' bash -s" <<'EOF'
          set -euo pipefail

          cd "$DEPLOY_PATH"

          cat > .env <<ENVVARS
          COMPOSE_PROJECT_NAME=$COMPOSE_PROJECT_NAME
          IMAGE_NAME=$IMAGE_NAME
          IMAGE_TAG=$IMAGE_TAG
          ENVVARS

          printf '%s' "$GHCR_PAT" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          docker compose --env-file .env -f compose.yaml pull
          docker compose --env-file .env -f compose.yaml up -d --remove-orphans

          for attempt in $(seq 1 30); do
            status=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}no-healthcheck{{end}}' loafyweb || true)
            if [ "$status" = "healthy" ]; then
              exit 0
            fi

            sleep 2
          done

          docker compose --env-file .env -f compose.yaml ps
          docker logs --tail 50 loafyweb || true
          exit 1
          EOF
